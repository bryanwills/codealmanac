<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Almanac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;1,400;1,500&display=swap"
    />
    <link rel="stylesheet" href="/app.css" />
    <link rel="stylesheet" href="/jobs.css" />
  </head>
  <body>
    <header class="ca-topbar">
      <div class="ca-topbar-inner">
        <button class="ca-brand ca-brand-route" type="button" data-route="/">
          <img class="ca-brand-mark-image" src="/almanac-logo.png" alt="" aria-hidden="true" />
          <span class="ca-brand-title">Almanac</span>
        </button>

        <form id="search-form" class="ca-topbar-search">
          <span class="ca-search-glyph" aria-hidden="true">⌕</span>
          <input id="search-input" type="search" placeholder="Search pages" autocomplete="off" />
        </form>

        <nav class="ca-topbar-nav" aria-label="Primary">
          <button data-route="/" class="ca-topbar-link is-active">Library</button>
          <button data-route="/review" class="ca-topbar-link">Review</button>
          <button data-route="/connections" class="ca-topbar-link">Connections</button>
          <button data-route="/jobs" class="ca-topbar-link">Jobs</button>
        </nav>
      </div>
    </header>

    <div id="app" class="ca-shell">
      <main class="ca-main">
        <div id="reader" class="ca-reader"></div>
      </main>

      <aside class="ca-right" hidden>
        <section class="ca-meta-block">
          <h2>Page</h2>
          <div id="page-meta" class="ca-meta-empty">Select a page.</div>
        </section>
        <section class="ca-meta-block">
          <h2>Linked from</h2>
          <div id="backlinks" class="ca-link-list"></div>
        </section>
        <section class="ca-meta-block">
          <h2>Files</h2>
          <div id="file-refs" class="ca-link-list"></div>
        </section>
        <section class="ca-meta-block">
          <h2>Sources</h2>
          <div id="sources" class="ca-link-list"></div>
        </section>
      </aside>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
